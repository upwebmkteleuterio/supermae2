    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Heart Checkbox Style */
        .heart-container {
          --heart-color: rgb(168, 85, 247);
          position: relative;
          width: 40px;
          height: 40px;
          transition: .3s;
        }
        .heart-container .checkbox {
          position: absolute;
          width: 100%;
          height: 100%;
          opacity: 0;
          z-index: 20;
          cursor: pointer;
        }
        .heart-container .svg-container {
          width: 100%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        .heart-container .svg-outline,
        .heart-container .svg-filled {
          fill: var(--heart-color);
          position: absolute;
          width: 24px;
          height: 24px;
        }
        .heart-container .svg-outline {
          fill: none;
          stroke: #cbd5e1;
          stroke-width: 2px;
        }
        .heart-container .svg-filled {
          animation: keyframes-svg-filled 0.6s;
          display: none;
        }
        .heart-container .svg-celebrate {
          position: absolute;
          animation: keyframes-svg-celebrate .5s;
          animation-fill-mode: forwards;
          display: none;
          stroke: var(--heart-color);
          fill: var(--heart-color);
          stroke-width: 2px;
        }
        .heart-container .checkbox:checked~.svg-container .svg-filled { display: block; }
        .heart-container .checkbox:checked~.svg-container .svg-celebrate { display: block; }
        .heart-container .checkbox:checked~.svg-container .svg-outline { display: none; }

        @keyframes keyframes-svg-filled {
          0% { transform: scale(0); }
          25% { transform: scale(1.2); }
          50% { transform: scale(1); filter: brightness(1.2); }
        }
        @keyframes keyframes-svg-celebrate {
          0% { transform: scale(0); }
          50% { opacity: 1; filter: brightness(1.2); }
          100% { transform: scale(1.4); opacity: 0; display: none; }
        }

        /* Skeleton Animation */
        @keyframes skeleton-loading {
          0% { background-position: 100% 50%; }
          100% { background-position: 0 50%; }
        }
        .skeleton {
          background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
          background-size: 200% 100%;
          animation: skeleton-loading 1.5s infinite;
        }

        /* Custom Floating Animation for Background Bubbles */
        @keyframes float-bubble {
          0%, 100% { transform: translate(0, 0) scale(1); }
          33% { transform: translate(30px, -50px) scale(1.1); }
          66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .animate-float-slow {
          animation: float-bubble 15s ease-in-out infinite;
        }
        .animate-float-reverse {
          animation: float-bubble 18s ease-in-out infinite reverse;
        }

        /* Border Beam Animation */
        @keyframes border-beam {
          100% {
            offset-distance: 100%;
          }
        }
        .animate-border-beam {
          animation: border-beam var(--duration) infinite linear;
        }

        /* Ripple Pulse Animation (2 pulses every 5 seconds) */
        @keyframes double-ripple {
          0% { transform: scale(1); opacity: 0; }
          4% { transform: scale(1.3); opacity: 0.5; }
          8% { transform: scale(1.7); opacity: 0; }
          12% { transform: scale(1); opacity: 0; }
          16% { transform: scale(1.3); opacity: 0.5; }
          20% { transform: scale(1.7); opacity: 0; }
          100% { transform: scale(1.7); opacity: 0; }
        }
        .animate-ripple-pulse {
          animation: double-ripple 5s infinite ease-out;
        }
    </style>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script>

    </script>
